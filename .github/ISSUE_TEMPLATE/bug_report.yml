name: Bug report
description: Report a desktop app or conversion workflow bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove API keys, tokens, local usernames if needed, and private server addresses before uploading logs or reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The app crashes when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, repeatable workflow.
      placeholder: |
        1. Open...
        2. Select...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: v0.1.0-alpha.3
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs or attach screenshots. Do not include secrets.
      render: text
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I removed API keys, tokens, and other secrets from logs and reports.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
