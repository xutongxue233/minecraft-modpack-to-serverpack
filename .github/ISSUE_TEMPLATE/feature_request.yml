name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
      placeholder: When converting large modpacks...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other designs.
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Desktop UI
        - Modpack parsing
        - Mod metadata and downloads
        - Client Mod rules
        - Serverpack generation
        - Startup scripts
        - Documentation
        - Release and packaging
        - Other
    validations:
      required: true
