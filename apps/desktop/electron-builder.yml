appId: com.mcsp.converter
productName: 整合包转服务端包工具
afterPack: build/after-pack.mjs
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  - build/icon.ico
  - build/ICON_LICENSE.txt
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: "Minecraft-Serverpack-Tool-Setup-${version}-${arch}.${ext}"
portable:
  artifactName: "Minecraft-Serverpack-Tool-Portable-${version}-${arch}.${ext}"
asar: true
