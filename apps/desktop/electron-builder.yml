appId: com.mcsp.converter
productName: Minecraft Serverpack Tool
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  - build/icon.ico
  - build/ICON_LICENSE.txt
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: "${productName}-Setup-${version}-${arch}.${ext}"
portable:
  artifactName: "${productName}-Portable-${version}-${arch}.${ext}"
asar: true
